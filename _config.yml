title: John Kyle Cooper
description: John Kyle Cooper builds AI-assisted and experimental tools for exploring thinking, learning, creativity, and problem solving.
url: "https://johnkylecooper.github.io"
baseurl: ""
markdown: kramdown
permalink: pretty

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: "assets"
    values:
      layout: null

exclude:
  - myenv/
  - .venv/
  - .vscode/
  - README.md
  - in-progress/
  - _inbox/
  - _drafts/
  - _recommendations/
  - JKC_CV.yaml
  - cvtheme/
