  sections:
    Professional Summary:
      - Research builder and data analyst working at the intersection of human behavior, experimental systems, and AI-assisted scientific workflows. I use programming, data analysis, and pragmatic AI tools to turn complex research questions into experiments, prototypes, analyses, and usable evidence.
    Research and Technical Strengths:
      - label: Research Practice
        details: Problem framing, experimental design, human-subject research, scientific writing
      - label: Programming and Analysis
        details: Python, MATLAB, R, and JavaScript for research data analysis, automation, scripting, and experimental workflows
      - label: Experimental Systems
        details: Audiovisual tasks, stimulus workflows, EEG systems, Unity and VR environments
      - label: Agentic AI Workflows
        details: Codex, skills, context and memory management, PRD/ARD/Markdown planning docs, structured grilling, and coding support
      - label: Collaboration
        details: Cross-disciplinary teams, participant studies, technical documentation, presentations
    Education:
