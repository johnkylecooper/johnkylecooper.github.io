    Professional Summary:
      - Analytical Biomedical Engineer with a focus on human-computer interaction and neuroimaging. Proven track record of developing immersive VR research environments in Unity/Unreal Engine and optimizing data pipelines for complex biological systems. Seeking to integrate advanced XR technology with rigorous cognitive neuroscience research to solve real-world clinical challenges.
