        highlights:
          - Germany Biosciences Program, Bonn, Germany
          - Greece Engineering Ethics, Thessaloniki, Greece
    Research and Technical Experience:
      - company: IRCN, The University of Tokyo
        position: Project Researcher
        location: Tokyo, Japan
        start_date: 2025-11
        end_date: "present"
        highlights:
          - Study insight, creativity, and problem solving using controlled puzzle tasks and human-centered experimental methods.
          - Develop research workflows for turning ambiguous questions about creativity into measurable tasks, participant procedures, and analyzable data.
          - Explore AI-supported methods for evaluating creative ideas and supporting research design.
      - company: KU Leuven
        position: FWO Strategic Basic Research PhD Fellow
        location: Leuven, Belgium
        start_date: 2021-11
        end_date: 2025-10
        highlights:
          - Built and maintained experiment and data workflows for neuroimaging studies of audiovisual speech perception and hearing outcomes.
          - Applied Python, MATLAB, R, and scikit-learn to process time-series data and support forecasting models for speech understanding.
          - Redesigned an interactive Unity-based audiovisual experiment to support controlled studies of realistic listening and human-computer interaction conditions.
      - company: University of Rochester
        position: Research Assistant
        location: Rochester, New York
        start_date: 2019-08
        end_date: 2021-05
        highlights:
          - Designed and implemented a Python-based experimental setup for audiovisual neuroimaging research, achieving sub-millisecond video playback timing.
          - Supported studies of speech perception and audiovisual congruence by coordinating experimental procedures, participant scheduling, and lab operations.
      - company: Texas A&M University
        position: Research Assistant
        location: College Station, Texas
        start_date: 2016-08
        end_date: 2019-05
        highlights:
          - Built VR and hardware prototypes for optical coherence tomography research, including an Unreal Engine viewer for 3D cochlear scans and fabricated power supply boxes for experimental scanning.
      - company: Lynntech Inc. and Enmodes GmbH
        position: Biomedical Engineering Design Teammate
        location: College Station, Texas and Aachen, Germany
        start_date: 2017-01
        end_date: 2019-05
        highlights:
          - Contributed to early-stage biomedical device design projects, including an orthotic rehabilitation device and a prototype respiratory support system.
    Selected Publications:
