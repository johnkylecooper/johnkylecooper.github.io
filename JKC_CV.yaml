        end_date: 2025-10
      - institution: University of Rochester
        area: Biomedical Engineering
        degree: MSc
        location: Rochester, New York
        start_date: 2019-08
        end_date: 2021-05
      - institution: Texas A&M University
        area: Biomedical Engineering
        degree: BSc
        location: College Station, Texas
        end_date: 2019-05
        highlights:
          # - Biomedical Engineering Fast-Track Program
          - Germany Biosciences Program, Bonn, Germany
          - Greece Engineering Ethics, Thessaloniki, Greece
    Technical Skills:
        - label: Programming
          details: Python, MATLAB, R, SQL, JavaScript, HTML, CSS
        - label: Frameworks
          details: scikit-learn, pandas, PyTorch, GitLab
        - label: Neuroimaging
          details: Advanced EEG (mne-python, Brain Vision, Biosemi software) and MRI data analysis
        - label: Virtual Reality (VR) Development
          details: Unity (C#), Pupil Labs, HTC Vive, Meta Quest, and Unreal Engine
        - label: 3-D design & printing
          details: SolidWorks & Blender
        - label: Languages
          details: Dutch (A2 level), Japanese (N4 level)
    Research Experience:
      - company: IRCN, The University of Tokyo
        position: Project Researcher
        location: Tokyo, Japan
        start_date: 2025-11
        end_date: "present"
        highlights:
          - Investigating the neural mechanisms of insightful problem solving.
      - company: KU Leuven
        position: FWO Strategic Basic Research PhD Fellow
        location: Leuven, Belgium
        start_date: 2021-11
        end_date: 2025-10
        highlights:
          - PIs Dr. Tom Francart, Dr. Astrid van Wieringen
          - Engineered experiment and data pipelines in GitLab for processing neuroimaging data used in time-series forecasting models from scikit-learn to predict speech understanding.
          - Enhanced shared data pipeline codebase in Gitlab with new features, optimizations, and documentation during monthly hackathons.
          - Redesigned VR environment using Unity and Javascript to investigate audiovisual effects using neuroimaging.  
      - company: University of Rochester
        position: Research Assistant
        location: Rochester, New York
        start_date: 2019-08
        end_date: 2021-05
        highlights:
          - PI Dr. Ross Maddox
          - Designed and implemented an experimental neuroimaging setup using Python to achieve sub-millisecond latency in video playback for audiovisual experiments.
          - Managed participant recruitment & scheduling, ordering supplies, and assisting with lab experiments.
      - company: Texas A&M University
        position: Research Assistant
        location: College Station, Texas
        start_date: 2016-08
        end_date: 2019-05
        highlights:
          - PI Dr. Brian Applegate
          - Developed virtual reality experience in Unreal Engine to view 3D volumetric scans of mouse cochlea.
          - Designed and fabricated power supply boxes used in experimental Optical Coherence Tomography (OCT) scanning setup.
      - company: Lynntech Inc.
        position: Design Teammate
        location: College Station, Texas
        start_date: 2018-09
        end_date: 2019-05
        highlights:
          - Designed and developed an orthotic rehabilitation device with a team of biomedical engineers.
      - company: Enmodes GmbH
        position: Design Teammate
        location: Aachen, Germany
        start_date: 2017-01
        end_date: 2017-05
        highlights:
          - Modeled a prototype of the Ras-Q (world’s first long-term respiratory system) and presented to the company.
