<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <style>
        :root {
            --bg-color: #f9f8f4;
            --nav-bg: #f1eee6;
            --text-primary: #4a4a4a;
            --text-secondary: #8c8c8c;
            --accent-color: #7d8b7a; 
            --accent-hover: #6a7768;
            --border-color: rgba(0, 0, 0, 0.05);
            --icon-fill: #4a4a4a;
        }

        body.dark-mode {
            --bg-color: #1a1a1c;
            --nav-bg: #222224;
            --text-primary: #d1d1d1;
            --text-secondary: #888888;
            --accent-color: #5c6d7e; 
            --accent-hover: #4a5a6a;
            --border-color: rgba(255, 255, 255, 0.05);
            --icon-fill: #f1eee6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Top Bar Container */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: 50px;
        }

        .navbar {
            padding: 8px;
            display: flex;
            gap: 10px;
            background-color: var(--nav-bg);
            border-radius: 50px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .navbar button {
            padding: 10px 25px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            background-color: transparent;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar button:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* Theme Toggle (Top Right) */
        .theme-toggle {
            position: absolute;
            right: 40px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: var(--icon-fill);
            transition: fill 0.5s ease;
        }

        .main-content {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 12vh;
            overflow-y: auto;
        }

        #display-area {
            width: 100%;
            max-width: 600px;
            padding: 0 30px;
            line-height: 1.8;
            font-size: 1.35rem;
            font-weight: 300;
            text-align: center;
        }

        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(3px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            margin-right: 0.25em;
        }

        .word.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .placeholder {
            color: var(--text-secondary);
            font-style: italic;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="navbar">
            <button onclick="showResponse('Hi! I’m Kyle. I focus on creating digital experiences that feel human, simple, and purposeful.')">About</button>
            <button onclick="showResponse('Current research: Investigating the psychological impact of minimalist UI on long-term user productivity and focus.')">Research</button>
            <button onclick="showResponse('Let’s chat. Reach me via email or through any of my social channels below.')">Contact</button>
        </div>

        <button class="theme-toggle" onclick="toggleDarkMode()" aria-label="Toggle Theme">
            <svg id="theme-icon" viewBox="0 0 24 24">
                <path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41 l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z"/>
            </svg>
        </button>
    </div>

    <div class="main-content">
        <div id="display-area">
            <span class="placeholder">Select a path to begin...</span>
        </div>
    </div>

    <script>
        let typingTimeout;

        function showResponse(text) {
            const displayArea = document.getElementById('display-area');
            displayArea.innerHTML = '';
            clearTimeout(typingTimeout);

            const words = text.split(' ');
            words.forEach((wordText, index) => {
                const span = document.createElement('span');
                span.textContent = wordText;
                span.className = 'word';
                displayArea.appendChild(span);
                
                setTimeout(() => {
                    span.classList.add('visible');
                }, index * 80); 
            });
        }

        function toggleDarkMode() {
            const isDarkMode = document.body.classList.toggle('dark-mode');
            const iconPath = document.querySelector('#theme-icon path');
            
            if (isDarkMode) {
                // Change to Moon Icon Path
                iconPath.setAttribute('d', 'M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36c-0.98,1.37-2.58,2.26-4.4,2.26 c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z');
            } else {
                // Change back to Sun Icon Path
                iconPath.setAttribute('d', 'M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20l0,2c0,0.55,0.45,1,1,1s1-0.45,1-1l0-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41 l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95z M19.42,5.99c0.39-0.39,0.39-1.03,0-1.41 c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41s1.03,0.39,1.41,0L7.05,18.36z');
            }
        }
    </script>
</body>
</html>
