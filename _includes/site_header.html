<header class="site-shell__header">
  <a class="site-mark" href="{{ '/' | relative_url }}">JKC</a>
  <nav class="site-nav" aria-label="Primary">
    {% for item in site.data.navigation %}
      {% if item.url contains '://' %}
        <a class="site-nav__link" href="{{ item.url }}">{{ item.title }}</a>
      {% else %}
        <a class="site-nav__link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endif %}
    {% endfor %}
  </nav>
</header>
